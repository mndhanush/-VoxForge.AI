<!DOCTYPE html>
<html lang="en" data-theme="dark" dir="ltr" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>404 - Voice Lost | VoxForge AI</title>
    <meta name="description" content="Page not found - We couldn't find the voice you're looking for.">

    <link rel="icon" href="Images/Growwpark favicon.jpg">
    
    <script src="tailwind.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: '#2563EB',   /* Strong Blue */
                        secondary: '#60A5FA', /* Light Blue */
                        bgLight: '#FFFFFF',   /* White */
                        bgDark: '#000000',    /* True Black */
                        cardLight: '#F8FAFC',
                        cardDark: '#0A0A0A',  /* Very Dark Grey */
                        textLight: '#000000',
                        textDark: '#FFFFFF',
                        accent: '#3B82F6'     /* Medium Blue */
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                    animation: { 
                        'fadeInUp': 'fadeInUp 0.6s ease-out',
                        'float': 'float 4s ease-in-out infinite'
                    },
                    keyframes: {
                        fadeInUp: {
                            'from': { opacity: '0', transform: 'translateY(30px)' },
                            'to': { opacity: '1', transform: 'translateY(0)' }
                        },
                        float: {
                            '0%, 100%': { transform: 'translateY(0px)' },
                            '50%': { transform: 'translateY(-15px)' }
                        }
                    }
                }
            }
        }
    </script>
    
    <style>
        :root {
            --bg-color: #FFFFFF;
            --text-color: #000000;
            --text-muted: #64748B;
            --card-bg: #F8FAFC;
            --border-color: #E2E8F0;
        }
        
        [data-theme="dark"] {
            --bg-color: #000000;
            --text-color: #FFFFFF;
            --text-muted: #9CA3AF;
            --card-bg: #0A0A0A;
            --border-color: #262626;
        }

        body {
            margin: 0; padding: 0;
            min-height: 100vh;
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color); 
            color: var(--text-color);
            transition: background-color 0.3s ease, color 0.3s ease;
            overflow-x: hidden;
        }

        .text-body-muted { color: var(--text-muted); }
        .border-theme { border-color: var(--border-color); }
        .bg-card-theme { background-color: var(--card-bg); }
    </style>
</head>
<body class="antialiased selection:bg-primary selection:text-white flex flex-col">

    <div class="fixed top-6 right-6 z-50 flex items-center gap-2">
        <button class="theme-toggle w-10 h-10 rounded-xl flex items-center justify-center bg-card-theme border border-theme hover:bg-primary hover:border-primary hover:text-white transition-all text-[var(--text-color)] group cursor-pointer shadow-sm" title="Toggle Theme">
            <i class="fas fa-moon theme-icon transition-transform"></i>
        </button>
        <button class="rtl-toggle-btn w-10 h-10 rounded-xl flex items-center justify-center bg-card-theme border border-theme hover:bg-primary hover:border-primary hover:text-white transition-all font-bold text-xs text-[var(--text-color)] cursor-pointer shadow-sm" title="Toggle Direction">
            RTL
        </button>
    </div>

    <main class="flex-grow flex flex-col items-center justify-center px-4 py-16 relative">
        
        <div class="absolute top-1/3 left-1/4 w-[400px] h-[400px] bg-primary/10 rounded-full blur-[100px] pointer-events-none -translate-x-1/2"></div>
        <div class="absolute bottom-1/4 right-1/4 w-[300px] h-[300px] bg-accent/10 rounded-full blur-[100px] pointer-events-none translate-x-1/2"></div>

        <div class="max-w-2xl w-full text-center relative z-10 animate-fadeInUp">
            
            <div class="flex flex-col items-center justify-center mb-6">
                <div class="w-16 h-16 bg-primary/10 border-2 border-primary rounded-2xl flex items-center justify-center mb-4 animate-float">
                    <i class="fas fa-volume-xmark text-primary text-3xl"></i>
                </div>
                <h3 class="text-xl font-black tracking-tight" style="color: var(--text-color);">VoxForge<span class="text-primary">.AI</span></h3>
            </div>

            <div class="relative py-4">
                <h1 class="text-[8rem] md:text-[12rem] font-black leading-none tracking-tighter opacity-[0.03] absolute left-1/2 top-1/2 -translate-x-1/2 -translate-y-1/2 select-none pointer-events-none w-full">
                    404
                </h1>
                
                <h2 class="text-4xl md:text-6xl font-black mb-4 tracking-tight relative z-10" style="color: var(--text-color);">
                    Voice <span class="text-primary">Lost.</span>
                </h2>
            </div>

            <p class="text-lg font-medium text-body-muted max-w-md mx-auto mb-10 relative z-10">
                It seems like the frequency you're looking for has gone silent. The page may have been moved, deleted, or never existed.
            </p>

            <div class="flex flex-col sm:flex-row items-center justify-center gap-4 relative z-10">
                <a href="index.html" class="w-full sm:w-auto bg-gradient-to-r from-primary to-accent text-white px-8 py-3.5 rounded-xl font-bold text-sm transition-all shadow-lg hover:shadow-primary/40 hover:-translate-y-1 flex items-center justify-center gap-2 uppercase tracking-wider no-underline">
                    <i class="fas fa-house"></i>
                    Back to Reality
                </a>
                
                <a href="contact.html" class="w-full sm:w-auto px-8 py-3.5 rounded-xl font-bold text-sm border border-theme bg-card-theme hover:bg-primary/5 transition-all flex items-center justify-center gap-2 no-underline" style="color: var(--text-color);">
                    <i class="fas fa-comment-dots text-primary"></i>
                    Report Issue
                </a>
            </div>

            <div class="mt-16 pt-8 border-t border-theme relative z-10">
                <p class="text-[10px] font-bold uppercase tracking-[0.2em] text-body-muted mb-6">Or try these frequencies</p>
                <div class="flex flex-wrap justify-center gap-6 text-sm font-bold">
                    <a href="voice-library.html" class="hover:text-primary transition-colors no-underline" style="color: var(--text-color);">Voice Library</a>
                    <a href="pricing.html" class="hover:text-primary transition-colors no-underline" style="color: var(--text-color);">Pricing</a>
                    <a href="api-docs.html" class="hover:text-primary transition-colors no-underline" style="color: var(--text-color);">API Docs</a>
                </div>
            </div>
        </div>
    </main>

    <footer class="py-8 text-center text-[10px] font-bold uppercase tracking-widest text-body-muted relative z-10">
        &copy; 2026 VoxForge AI. All rights reserved.
    </footer>

    <script>
        const htmlElement = document.documentElement;
        const themeToggleBtns = document.querySelectorAll('.theme-toggle');

        // --- Theme Logic ---
        function updateThemeIcons(isDark) {
            themeToggleBtns.forEach(btn => {
                const icon = btn.querySelector('.theme-icon');
                if (isDark) {
                    icon.classList.replace('fa-moon', 'fa-sun');
                } else {
                    icon.classList.replace('fa-sun', 'fa-moon');
                }
            });
        }

        themeToggleBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                const isDark = htmlElement.classList.toggle('dark');
                htmlElement.setAttribute('data-theme', isDark ? 'dark' : 'light');
                localStorage.setItem('theme', isDark ? 'dark' : 'light');
                updateThemeIcons(isDark);
            });
        });

        // Initialize Theme
        const savedTheme = localStorage.getItem('theme') || 'dark';
        if (savedTheme === 'dark') {
            htmlElement.classList.add('dark');
            htmlElement.setAttribute('data-theme', 'dark');
            updateThemeIcons(true);
        } else {
            htmlElement.classList.remove('dark');
            htmlElement.setAttribute('data-theme', 'light');
            updateThemeIcons(false);
        }

        // --- RTL Logic ---
        const rtlToggleBtn = document.querySelector('.rtl-toggle-btn');
        rtlToggleBtn.addEventListener('click', () => {
            const current = htmlElement.getAttribute("dir") || "ltr";
            const next = current === "rtl" ? "ltr" : "rtl";
            htmlElement.setAttribute("dir", next);
            localStorage.setItem("direction", next);
            rtlToggleBtn.innerText = next === 'rtl' ? 'LTR' : 'RTL';
        });

        if (localStorage.getItem("direction") === "rtl") {
            htmlElement.setAttribute("dir", "rtl");
            rtlToggleBtn.innerText = 'LTR';
        }
    </script>
</body>
</html>
